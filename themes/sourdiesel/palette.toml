[[consumers]]
id = "fzf"
label = "fzf"
group = "Terminal and shell"
paths = ["cli/fzf/fzf.sh"]
parser = "env"

[[consumers]]
id = "eza"
label = "eza"
group = "Files and icons"
paths = ["cli/eza/theme.yml"]
parser = "eza"

[[consumers]]
id = "webdevicons"
label = "web-devicons"
group = "Files and icons"
paths = ["editors/nvim/lua/plugins/webdevicons.lua"]
parser = "webdevicons"
# nvim-web-devicons defines these case-insensitive highlight group names with
# different colors. Custom overrides must use unique SourDiesel-prefixed names.
reserved_highlight_names = ["Dockerfile", "LICENSE", "Lua", "Readme", "Security"]

[[consumers]]
id = "neovim"
label = "Neovim"
group = "Syntax and editors"
paths = ["editors/nvim/lua/ui/highlights/init.lua", "editors/nvim/init.lua"]
