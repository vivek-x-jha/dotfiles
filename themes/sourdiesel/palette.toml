schema_version = 1
name = "SourDiesel"

[ansi.black]
index = 0
hex = "#cccccc"
role = "soft neutral and structural text"

[ansi.red]
index = 1
hex = "#ffc7c7"
role = "errors, removals, and invalid state"

[ansi.green]
index = 2
hex = "#ceffc9"
role = "success, additions, strings, and commands"

[ansi.yellow]
index = 3
hex = "#fdf7cd"
role = "warnings, escapes, and secondary emphasis"

[ansi.blue]
index = 4
hex = "#c4effa"
role = "paths, directories, functions, and guidance"

[ansi.magenta]
index = 5
hex = "#eccef0"
role = "keywords, configuration, and primary accent"

[ansi.cyan]
index = 6
hex = "#8ae7c5"
role = "data, sockets, punctuation, and supporting accent"

[ansi.white]
index = 7
hex = "#f4f3f2"
role = "primary foreground"

[ansi.brightblack]
index = 8
hex = "#5c617d"
role = "muted text, comments, and inactive state"

[ansi.brightred]
index = 9
hex = "#f096b7"
role = "strong error and destructive emphasis"

[ansi.brightgreen]
index = 10
hex = "#d2fd9d"
role = "strong success and executable emphasis"

[ansi.brightyellow]
index = 11
hex = "#f3b175"
role = "strong warning and document emphasis"

[ansi.brightblue]
index = 12
hex = "#80d7fe"
role = "strong path, syntax, and informational emphasis"

[ansi.brightmagenta]
index = 13
hex = "#c9ccfb"
role = "secondary accent and selected state"

[ansi.brightcyan]
index = 14
hex = "#47e7b1"
role = "completion, note, and active supporting state"

[ansi.brightwhite]
index = 15
hex = "#ffffff"
role = "maximum-contrast foreground"

[extras.dark]
hex = "#1b1c28"
role = "dark application background"

[extras.grey]
hex = "#313244"
role = "selection and elevated surface"

[extras.terminal_surface]
hex = "#212030"
role = "terminal and desktop chrome surface"

[tokens]
nvim_background = "NONE"

[[mirrors]]
id = "shell"
path = "shells/colors/sourdiesel"
parser = "shell"

[[mirrors]]
id = "wezterm"
path = "terminals/wezterm/wezterm.lua"
parser = "lua"

[[mirrors]]
id = "neovim"
path = "editors/nvim/lua/ui/highlights/sourdiesel.lua"
parser = "lua"

[[mirrors]]
id = "hammerspoon"
path = "apps/hammerspoon/init.lua"
parser = "lua"

[[consumers]]
id = "shell"
label = "Shell ANSI"
group = "Terminal and shell"
paths = ["shells/colors/sourdiesel"]
parser = "shell"

[[consumers]]
id = "wezterm"
label = "WezTerm"
group = "Terminal and shell"
paths = ["terminals/wezterm/wezterm.lua"]
parser = "lua"

[[consumers]]
id = "terminal-app"
label = "Terminal.app"
group = "Terminal and shell"
paths = ["terminals/terminal/sourdiesel.terminal"]
parser = "manual"
manual_note = "ANSI profile uses archived NSColor values; inspect after palette changes"

[[consumers]]
id = "tmux"
label = "tmux"
group = "Terminal and shell"
paths = ["terminals/tmux/tmux.conf"]
parser = "ansi"

[[consumers]]
id = "starship"
label = "Starship"
group = "Terminal and shell"
paths = ["shells/starship.toml"]
parser = "ansi"

[[consumers]]
id = "powerlevel10k"
label = "Powerlevel10k"
group = "Terminal and shell"
paths = ["shells/zsh/.p10k.zsh"]
