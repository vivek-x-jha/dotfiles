[codex]
command = "codex"
transcript_turns = 3

[tmux]
command = "tmux"
agent_window_names = ["agents"]
new_window_prefix = "agent:"

[ui]
archived_default = false
archive_icon = ""
default_harness = "pi"

[theme]
background = ""
surface = ""
foreground = "#f4f3f2"
muted = "#5c617d"
accent = "#eccef0"
selected = "#313244"
success = "#d2fd9d"
warning = "#f3b175"
error = "#f096b7"
title_focused = "$BRIGHTGREEN_HEX"
title_unfocused = "$BRIGHTBLACK_HEX"
border_focused = "$BLACK_HEX"
border_unfocused = "$BRIGHTBLACK_HEX"
status_projects = "#c9ccfb"
status_threads = "#c4effa"
status_open = "#f4f3f2"
status_new = "$BRIGHTBLUE_HEX"
status_new_chat = "#ceffc9"
status_search = "#f3b175"
status_archive = "#eccef0"
status_archive_action = "#ffc7c7"
status_unarchive = "#8ae7c5"
status_delete = "#f096b7"
status_help = "#fdf7cd"
archive_icon = "$RED_HEX"
live = "$BRIGHTGREEN_HEX"
inactive = "$BRIGHTBLACK_HEX"
status_key = "$WHITE_HEX"
status_sessions = "$BLUE_HEX"
status_project = "$BLUE_HEX"
status_thread_name = "$YELLOW_HEX"
status_thread_id = "$BRIGHTYELLOW_HEX"
status_context = "$CYAN_HEX"
status_archived = "$RED_HEX"
status_timestamp = "$BLACK_HEX"
status_updated = "$BRIGHTMAGENTA_HEX"
preview_metadata_key = "$WHITE_HEX"
preview_metadata_thread = "$YELLOW_HEX"
