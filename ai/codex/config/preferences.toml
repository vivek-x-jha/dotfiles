personality = "pragmatic"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
writable_roots = []

[tui]
terminal_title = ["activity", "thread-title"]
status_line = ["model-with-reasoning", "context-remaining", "total-input-tokens", "five-hour-limit", "weekly-limit", "run-state"]
status_line_use_colors = true

[features]
js_repl = false

[plugins."computer-use@openai-bundled".mcp_servers.computer-use]
enabled = false

[plugins."openai-developers@openai-curated".mcp_servers.openai-api-key-local-confirmation]
enabled = false
