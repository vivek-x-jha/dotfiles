[codex]
command = "codex"
transcript_turns = 3

[tmux]
command = "tmux"
agent_window_names = ["agents"]
new_window_prefix = "agent:"

[ui]
archived_default = false
archive_icon = ""

[theme]
background = "#1b1c28"
surface = "#212030"
foreground = "#f4f3f2"
muted = "#5c617d"
accent = "#eccef0"
selected = "#313244"
success = "#d2fd9d"
warning = "#f3b175"
error = "#f096b7"
title_focused = "$BRIGHTGREEN_HEX"
title_unfocused = "$BRIGHTBLACK_HEX"
border_focused = "$BLACK_HEX"
border_unfocused = "$BRIGHTBLACK_HEX"
status_projects = "#c9ccfb"
status_threads = "#c4effa"
status_open = "#f4f3f2"
status_new = "$BRIGHTBLUE_HEX"
status_new_chat = "#ceffc9"
status_search = "#f3b175"
status_archive = "#eccef0"
status_archive_action = "#ffc7c7"
status_unarchive = "#8ae7c5"
status_delete = "#f096b7"
status_help = "#fdf7cd"
archive_icon = "$RED_HEX"
preview_user = "#c4effa"
preview_codex = "#8ae7c5"
preview_pi = "#8ae7c5"
preview_text = "#cccccc"
new_chat_unfocused = "$BRIGHTBLACK_HEX"
new_chat_pi = "$CYAN_HEX"
new_chat_claude = "$BRIGHTYELLOW_HEX"
new_chat_codex = "$BLUE_HEX"
new_chat_cursor = "$MAGENTA_HEX"
new_chat_opencode = "$GREEN_HEX"
